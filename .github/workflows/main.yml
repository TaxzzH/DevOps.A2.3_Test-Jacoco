name: Spring Boot CI/CD Pipeline

on: 
  push:
    branches:
      - main   
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests with JaCoCo
    runs-on: ubuntu-latest

    steps:
    # Paso 1: Checkout del Repo
    - name: Checkout code
      uses: actions/checkout@v4
      
    # Paso 2: Configurar JDK
    - name: Setup JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
      
    # Paso 3: Cache de dependencias de Maven
    - name: Cache Maven
      uses: actions/cache@v3
      with:
        path: ~/.m2
        keyy: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-m2
    
    # Paso 4: Construir proyecto y ejecutar tests
    - name: Build & tests
      run: mvn clean verify

    # Paso 5: Publicar reporte de cobertura JaCoCo
    - name: Upload JaCoCo Report
      uses: actions/upload-artifact@v3
      with:
        name: jacoco-report
        path: target/site/jacoco/
    
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    # Paso 1: Checkout del Repo
    - name: Checkout code
      uses: actions/checkout@v3
    
    # Paso 2: Config JDK
    - name: Setup JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
    
    # Paso 3: Construir Artefacto JAR
    - name: Pakage application
      run: mvn clean package -DskipTests

    # Paso 4: Subir Artefacto JAR
    - name: Upload JAR Artefact
      uses: actions/upload-artifact@v3
      with:
        name: app-jar
        path: target/*.jar